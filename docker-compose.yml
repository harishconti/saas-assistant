services:
  # ──────────────────────────────────────────────────────────────────────────────
  # LiteLLM Proxy — unified LLM gateway for all agents
  # ──────────────────────────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: saas-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./gateway/litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Lets container reach host Ollama at 11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — long-term task state, specs, test results
  # ──────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-saas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas_user} -d ${POSTGRES_DB:-saas_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────────
  # Redis — short-term conversational memory and caching
  # ──────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────────
  # SaaS Assistant — The main multi-agent team API
  # ──────────────────────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: saas-assistant
    ports:
      - "8000:8000"
    environment:
      - LITELLM_PROXY_URL=http://litellm:4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-saas_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-saas_assistant}
      - REDIS_URL=redis://redis:6379/0
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - AIRWEAVE_API_KEY=${AIRWEAVE_API_KEY}
      - MEM0_API_KEY=${MEM0_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Sandbox credentials for remote execution
      - SANDBOX_ENDPOINT_URL=${SANDBOX_ENDPOINT_URL}
      - SANDBOX_API_KEY=${SANDBOX_API_KEY}
    depends_on:
      litellm:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
